<svg xmlns="http://www.w3.org/2000/svg" width="176" height="544" class="svgbob">
  <style>.svgbob line, .svgbob path, .svgbob circle, .svgbob rect, .svgbob polygon {
  stroke: black;
  stroke-width: 2;
  stroke-opacity: 1;
  fill-opacity: 1;
  stroke-linecap: round;
  stroke-linejoin: miter;
}

.svgbob text {
  white-space: pre;
  fill: black;
  font-family: Iosevka Fixed, monospace;
  font-size: 14px;
}

.svgbob rect.backdrop {
  stroke: none;
  fill: white;
}

.svgbob .broken {
  stroke-dasharray: 8;
}

.svgbob .filled {
  fill: black;
}

.svgbob .bg_filled {
  fill: white;
  stroke-width: 1;
}

.svgbob .nofill {
  fill: white;
}

.svgbob .end_marked_arrow {
  marker-end: url(#arrow);
}

.svgbob .start_marked_arrow {
  marker-start: url(#arrow);
}

.svgbob .end_marked_diamond {
  marker-end: url(#diamond);
}

.svgbob .start_marked_diamond {
  marker-start: url(#diamond);
}

.svgbob .end_marked_circle {
  marker-end: url(#circle);
}

.svgbob .start_marked_circle {
  marker-start: url(#circle);
}

.svgbob .end_marked_open_circle {
  marker-end: url(#open_circle);
}

.svgbob .start_marked_open_circle {
  marker-start: url(#open_circle);
}

.svgbob .end_marked_big_open_circle {
  marker-end: url(#big_open_circle);
}

.svgbob .start_marked_big_open_circle {
  marker-start: url(#big_open_circle);
}

</style>
  <defs>
    <marker id="arrow" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 0,4 4,2 0,0"></polygon>
    </marker>
    <marker id="diamond" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,2 2,0 4,2 2,4 0,2"></polygon>
    </marker>
    <marker id="circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <circle cx="4" cy="4" r="2" class="filled"></circle>
    </marker>
    <marker id="open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <circle cx="4" cy="4" r="2" class="bg_filled"></circle>
    </marker>
    <marker id="big_open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <circle cx="4" cy="4" r="3" class="bg_filled"></circle>
    </marker>
  </defs>
  <rect class="backdrop" x="0" y="0" width="176" height="544"></rect>
  <rect x="4" y="456" width="136" height="64" class="solid nofill" rx="0"></rect>
  <text x="18" y="492" >Loader&lt;D&gt;</text>
  <polygon points="72,100 80,100 76,112" class="filled"></polygon>
  <polygon points="72,212 80,212 76,224" class="filled"></polygon>
  <polygon points="72,324 80,324 76,336" class="filled"></polygon>
  <polygon points="72,436 80,436 76,448" class="filled"></polygon>
  <text x="18" y="44" >Extractor&lt;A&gt;</text>
  <text x="18" y="156" >Transformer&lt;A,</text>
  <text x="138" y="156" >B&gt;</text>
  <text x="18" y="268" >Transformer&lt;B,</text>
  <text x="138" y="268" >C&gt;</text>
  <text x="18" y="380" >Transformer&lt;C,</text>
  <text x="138" y="380" >D&gt;</text>
  <g>
    <line x1="4" y1="8" x2="140" y2="8" class="solid"></line>
    <line x1="4" y1="8" x2="4" y2="72" class="solid"></line>
    <line x1="140" y1="8" x2="140" y2="72" class="solid"></line>
    <line x1="4" y1="72" x2="140" y2="72" class="solid"></line>
    <line x1="76" y1="72" x2="76" y2="100" class="solid"></line>
  </g>
  <g>
    <line x1="4" y1="120" x2="164" y2="120" class="solid"></line>
    <line x1="4" y1="120" x2="4" y2="184" class="solid"></line>
    <line x1="164" y1="120" x2="164" y2="184" class="solid"></line>
    <line x1="4" y1="184" x2="164" y2="184" class="solid"></line>
    <line x1="76" y1="184" x2="76" y2="212" class="solid"></line>
  </g>
  <g>
    <line x1="4" y1="232" x2="164" y2="232" class="solid"></line>
    <line x1="4" y1="232" x2="4" y2="296" class="solid"></line>
    <line x1="164" y1="232" x2="164" y2="296" class="solid"></line>
    <line x1="4" y1="296" x2="164" y2="296" class="solid"></line>
    <line x1="76" y1="296" x2="76" y2="324" class="solid"></line>
  </g>
  <g>
    <line x1="4" y1="344" x2="164" y2="344" class="solid"></line>
    <line x1="4" y1="344" x2="4" y2="408" class="solid"></line>
    <line x1="164" y1="344" x2="164" y2="408" class="solid"></line>
    <line x1="4" y1="408" x2="164" y2="408" class="solid"></line>
    <line x1="76" y1="408" x2="76" y2="436" class="solid"></line>
  </g>
</svg>
